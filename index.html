<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河南导航 - 高校 & 政府采购</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            --radius: 12px;
        }

        [data-theme="light"] {
            --bg-dark: #f0f4f8;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        [data-theme="light"] body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e0e7ff 50%, #f0f4f8 100%);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-brand span {
            font-size: 1.5rem;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .nav-tab {
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .nav-tab:hover {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .nav-tab.active.gov {
            background: linear-gradient(135deg, var(--accent), #d97706);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .nav-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .nav-stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 侧边栏 */
        .sidebar {
            width: 200px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            height: calc(100vh - 60px);
            position: fixed;
            left: 0;
            top: 60px;
            overflow-y: auto;
            z-index: 100;
            border-right: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .visit-counter {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200px;
            display: flex;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid var(--border);
            gap: 12px;
            z-index: 101;
            height: 45px;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h3 {
            font-size: 0.9em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .sidebar-list { 
            padding: 12px 8px; 
            max-height: calc(100vh - 180px); 
            overflow-y: auto; 
        }

        /* 访问计量 */
        .visit-counter {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200px;
            display: flex;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(5px);
            border-top: 1px solid var(--border);
            gap: 12px;
            z-index: 101;
            height: 45px;
        }

        .counter-item {
            flex: 1;
            text-align: center;
        }

        .counter-label {
            display: block;
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .counter-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-light);
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 4px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .sidebar-item:hover {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .sidebar-item.active.gov {
            background: linear-gradient(135deg, var(--accent), #f59e0b);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .sidebar-icon { margin-right: 12px; font-size: 16px; }

        .sidebar-count {
            margin-left: auto;
            background: rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* 主内容区 */
        .main-content {
            margin-left: 200px;
            margin-top: 60px;
            padding: 25px 30px;
            min-height: calc(100vh - 60px);
            position: relative;
            z-index: 1;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .content-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .content-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .content-title .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .search-box {
            position: relative;
            width: 320px;
        }

        .search-box.internet-search {
            width: 280px;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid transparent;
            border-radius: 50px;
            background: rgba(30, 41, 59, 0.8);
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder { color: var(--text-secondary); }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .toolbar-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: white;
        }

        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group::before {
            content: '';
            font-size: 12px;
            color: var(--text-secondary);
            margin-right: 5px;
        }

        .filter-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .filter-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .filter-btn.active.gov {
            background: linear-gradient(135deg, var(--accent), #f59e0b);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(30, 41, 59, 0.95);
        }

        .card.gov:hover {
            border-color: rgba(245, 158, 11, 0.3);
        }

        .card.benke { border-left: 4px solid #ef4444; }
        .card.zhuanke { border-left: 4px solid #10b981; }
        .card.shengji { border-left: 4px solid var(--accent); }
        .card.dishiji { border-left: 4px solid var(--success); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card-favicon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .card-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .card.gov .card-logo {
            background: linear-gradient(135deg, var(--accent), #f59e0b);
        }

        .card-info { flex: 1; min-width: 0; }

        .card-title {
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .card-tag.benke { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .card-tag.zhuanke { background: linear-gradient(135deg, #34d399, #10b981); color: white; }
        .card-tag.shengji { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .card-tag.dishiji { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        .card-category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
            margin-left: 4px;
        }

        .card-school-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 4px;
        }

        .card-school-type.public {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .card-school-type.private {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .card-school-type.coop {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }

        .card-url {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            word-break: break-all;
            background: rgba(15, 23, 42, 0.5);
            padding: 6px 8px;
            border-radius: 6px;
            max-height: 32px;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-fav {
            background: rgba(245, 158, 11, 0.15);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-fav:hover {
            background: rgba(245, 158, 11, 0.3);
            transform: scale(1.1);
        }

        .card-fav.active {
            background: var(--accent);
        }

        .card-action {
            padding: 6px 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            text-decoration: none;
            display: inline-block;
        }

        .card.gov .card-action {
            background: linear-gradient(135deg, var(--accent), #f59e0b);
        }

        .card-action:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }

        .empty-state .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }

        /* 移动端 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1001;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            margin: 4px 0;
            border-radius: 2px;
        }

        @media (max-width: 1400px) {
            .card-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 1100px) {
            .card-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 80px 15px 20px; }
            .nav-tabs { display: none; }
            .nav-brand { font-size: 1rem; }
            .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .search-box { width: 100%; }
            .content-header { flex-direction: column; align-items: flex-start; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }

        /* 返回顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            z-index: 999;
            display: none;
        }

        .back-to-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        /* 主题切换 */
        .theme-toggle {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        /* 搜索引擎选择 */
        .internet-search {
            position: relative;
        }

        .search-engine-select {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid var(--border);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            z-index: 1;
        }

        .internet-search input {
            padding-left: 80px !important;
        }

        /* 政府采购搜索 */
        .gov-search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: var(--radius);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        #monitorSearchBox {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        #monitorSearchBox button {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
        }

        .gov-search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.8);
            color: white;
            font-size: 14px;
            outline: none;
        }

        .gov-search-box input:focus {
            border-color: var(--accent);
        }

        .gov-search-box select {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.8);
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .gov-search-box button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gov-search-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .search-engine-select option {
            background: #1e293b;
        }

        [data-theme="light"] .search-engine-select,
        [data-theme="light"] .search-box,
        [data-theme="light"] .toolbar-btn,
        [data-theme="light"] .card,
        [data-theme="light"] .sidebar,
        [data-theme="light"] .top-nav,
        [data-theme="light"] .menu-toggle {
            background: #fff !important;
            color: #1e293b;
            border-color: rgba(0,0,0,0.1);
        }

        [data-theme="light"] .card:hover {
            background: #f8fafc !important;
        }

        [data-theme="light"] .search-box input {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #e2e8f0;
        }

        [data-theme="light"] .card-url {
            background: #f1f5f9;
        }

        [data-theme="light"] .sidebar-item:hover,
        [data-theme="light"] .sidebar-item.active {
            background: linear-gradient(135deg, var(--primary), #8b5cf6) !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span></span><span></span><span></span>
    </button>

    <button class="back-to-top" id="backToTop" onclick="backToTop()">⬆️</button>

    <nav class="top-nav">
        <div class="nav-brand">
            <span>🗺️</span>河南导航
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-module="university">🎓 高校导航</button>
            <button class="nav-tab gov" data-module="gov">📋 政府采购</button>
        </div>
        <div class="nav-stats" id="navStats">
            <span>📚 180 所高校</span>
            <span>📋 19 个政府采购网</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </nav>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebarTitle">按城市筛选</h3>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
    </aside>
    
    <!-- 访问计量 -->
    <div class="visit-counter">
        <div class="counter-item">

        function init() {
            const savedStats = localStorage.getItem('visitStats');
            if (savedStats) {
                try { visitStats = JSON.parse(savedStats); } catch(e) { visitStats = {}; }
            }
            
            const savedFavorites = localStorage.getItem('favorites');
            if (savedFavorites) {
                try { favorites = new Set(JSON.parse(savedFavorites)); } catch(e) { favorites = new Set(); }
            }
            
            renderSidebar();
            renderFilters();
            renderCards();
            initEvents();
        }

        function visitUrl(id, url, event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            if (url && url !== '#') {
                const key = currentModule + '_' + id;
                visitStats[key] = (visitStats[key] || 0) + 1;
                localStorage.setItem('visitStats', JSON.stringify(visitStats));
                
                // 更新今日访问
                const today = new Date().toDateString();
                const savedDate = localStorage.getItem('lastVisitDate');
                let todayVisits = parseInt(localStorage.getItem('todayVisits') || '0');
                if (savedDate !== today) {
                    todayVisits = 0;
                }
                todayVisits++;
                localStorage.setItem('todayVisits', todayVisits.toString());
                localStorage.setItem('lastVisitDate', today);
                
                window.open(url, '_blank');
                renderCards();
                updateVisitStats();
            }
        }

        function toggleFavorite(id) {
            const key = currentModule + '_' + id;
            if (favorites.has(key)) {
                favorites.delete(key);
            } else {
                favorites.add(key);
            }
            localStorage.setItem('favorites', JSON.stringify([...favorites]));
            renderCards();
            updateVisitStats();
        }

        function exportData() {
            const data = {
                favorites: [...favorites],
                visitStats: visitStats,
                exportTime: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'henan_nav_data_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.favorites) {
                        favorites = new Set(data.favorites);
                        localStorage.setItem('favorites', JSON.stringify([...favorites]));
                    }
                    if (data.visitStats) {
                        visitStats = data.visitStats;
                        localStorage.setItem('visitStats', JSON.stringify(visitStats));
                    }
                    renderCards();
                    alert('数据导入成功！');
                } catch(err) {
                    alert('导入失败，请检查文件格式');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function doInternetSearch() {
            const keyword = document.getElementById('internetSearch').value.trim();
            const engine = document.getElementById('searchEngine').value;
            if (keyword) {
                const urls = {
                    baidu: 'https://www.baidu.com/s?wd=',
                    bing: 'https://www.bing.com/search?q=',
                    google: 'https://www.google.com/search?q=',
                    sogou: 'https://www.sogou.com/web?query='
                };
                window.open(urls[engine] + encodeURIComponent(keyword), '_blank');
            }
        }

        function doMonitorSearch() {
            const keyword = document.getElementById('monitorKeyword').value.trim();
            const scope = document.getElementById('monitorScope').value;
            if (!keyword) {
                alert('请输入要监控的关键词');
                return;
            }
            
            let searchKeyword = keyword;
            if (scope === 'all') {
                searchKeyword = keyword + ' 河南高校';
            } else if (scope === '其他') {
                searchKeyword = keyword + ' 河南 ' + scope + ' 高校';
            } else {
                searchKeyword = keyword + ' ' + scope + ' 高校';
            }
            
            // 用百度搜索高校动态
            const searchUrl = 'https://www.baidu.com/s?wd=' + encodeURIComponent(searchKeyword);
            window.open(searchUrl, '_blank');
        }

        function doGovSearch() {
            const keyword = document.getElementById('govSearchInput').value.trim();
            const site = document.getElementById('govSearchSite').value;
            if (keyword) {
                // 用百度搜索指定政府采购网的内容
                const govDomains = {
                    henan: 'zfcg.henan.gov.cn',
                    zhengzhou: 'zhengzhou.zfcg.henan.gov.cn',
                    kaifeng: 'kaifeng.zfcg.henan.gov.cn',
                    luoyang: 'luoyang.zfcg.henan.gov.cn',
                    pingdingshan: 'pingdingshan.zfcg.henan.gov.cn',
                    anyang: 'anyang.zfcg.henan.gov.cn',
                    hebi: 'hebi.zfcg.henan.gov.cn',
                    xinxiang: 'ccgp-henan.gov.cn/xinxiang',
                    jiaozuo: 'jiaozuo.zfcg.henan.gov.cn',
                    puyang: 'puyang.zfcg.henan.gov.cn',
                    xuchang: 'ccgp-henan.gov.cn/xuchang',
                    luohe: 'luohe.zfcg.henan.gov.cn',
                    sanmenxia: 'sanmenxia.zfcg.henan.gov.cn',
                    nanyang: 'nanyang.zfcg.henan.gov.cn',
                    shangqiu: 'shangqiu.zfcg.henan.gov.cn',
                    xinyang: 'xinyang.zfcg.henan.gov.cn',
                    zhoukou: 'zhoukou.zfcg.henan.gov.cn',
                    zhumadian: 'ccgp-henan.gov.cn/zhumadian',
                    jiyuan: 'ccgp-henan.gov.cn/jiyuan'
                };
                const domain = govDomains[site];
                const searchUrl = 'https://www.baidu.com/s?wd=' + encodeURIComponent(keyword + ' site:' + domain);
                window.open(searchUrl, '_blank');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        function backToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onscroll = function() {
            const btn = document.getElementById('backToTop');
            if (document.documentElement.scrollTop > 300) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
            if (e.key === 'Escape') {
                document.getElementById('searchInput').blur();
                document.getElementById('internetSearch').blur();
                document.getElementById('searchInput').value = '';
                searchFilter = '';
                renderCards();
            }
        });

        // 页面加载时恢复主题
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.setAttribute('data-theme', 'light');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        })();

        function renderSidebar() {
            const data = currentModule === 'university' ? universityData : govData;
            const counts = {};
            data.items.forEach(item => {
                counts[item.location] = (counts[item.location] || 0) + 1;
            });

            document.getElementById('sidebarList').innerHTML = data.sidebar.map(item => {
                const count = item.key === 'all' ? data.items.length : (counts[item.key] || 0);
                return `
                    <div class="sidebar-item ${cityFilter === item.key ? 'active' : ''}" data-city="${item.key}">
                        <span class="sidebar-icon">${item.icon}</span>
                        <span>${item.name}</span>
                        <span class="sidebar-count">${count}</span>
                    </div>
                `;
            }).join('');
            
            updateVisitStats();
        }

        function updateVisitStats() {
            // 总访问次数
            let totalVisits = 0;
            Object.values(visitStats).forEach(v => totalVisits += v);
            document.getElementById('totalVisits').textContent = totalVisits;
            
            // 今日访问
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('lastVisitDate');
            if (savedDate !== today) {
                localStorage.setItem('todayVisits', '0');
                localStorage.setItem('lastVisitDate', today);
            }
            const todayVisits = parseInt(localStorage.getItem('todayVisits') || '0');
            document.getElementById('todayVisits').textContent = todayVisits;
        }

        function renderFilters() {
            const data = currentModule === 'university' ? universityData : govData;
            let filtersHtml = '';
            
        // 类型筛选
        filtersHtml += '<div class="filter-group">';
        filtersHtml += data.filters.map(f => `
            <button class="filter-btn ${typeFilter === f.key ? 'active' : ''}" data-type="${f.key}">${f.name}</button>
        `).join('');
        filtersHtml += '</div>';
        
        // 学校类型筛选（仅高校）
        if (currentModule === 'university') {
            filtersHtml += '<div class="filter-group">';
            filtersHtml += [
                {name: '全部', key: 'all'},
                {name: '民办', key: 'private'},
                {name: '公办', key: 'public'}
            ].map(f => `
                <button class="filter-btn ${schoolTypeFilter === f.key ? 'active' : ''}" data-school-type="${f.key}">${f.name}</button>
            `).join('');
            filtersHtml += '</div>';
        }
        
        // 类别筛选（仅高校）
        if (currentModule === 'university') {
            filtersHtml += '<div class="filter-group">';
            filtersHtml += categoryFilters.map(f => `
                <button class="filter-btn category-filter ${categoryFilter === f.key ? 'active' : ''}" data-category="${f.key}">${f.name}</button>
            `).join('');
            filtersHtml += '</div>';
        }
            
            document.getElementById('filters').innerHTML = filtersHtml;
        }

        function renderCards() {
            const data = currentModule === 'university' ? universityData : govData;
            const filtered = data.items.filter(item => {
                const matchCity = cityFilter === 'all' || item.location === cityFilter;
                const matchType = typeFilter === 'all' || item.type === typeFilter;
                const matchCategory = categoryFilter === 'all' || getCategory(item.name) === categoryFilter;
                const matchSchoolType = schoolTypeFilter === 'all' || 
                    (schoolTypeFilter === 'public' && getSchoolType(item.name) === '公办') ||
                    (schoolTypeFilter === 'private' && (getSchoolType(item.name) === '民办' || getSchoolType(item.name) === '中外合作'));
                const matchSearch = searchFilter === '' || item.name.toLowerCase().includes(searchFilter.toLowerCase());
                return matchCity && matchType && matchCategory && matchSchoolType && matchSearch;
            });

            const grid = document.getElementById('cardGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>没有找到匹配的网站</p></div>';
                return;
            }

            grid.innerHTML = filtered.map((item, index) => {
                const logoChar = item.name.charAt(0);
                const cardClass = currentModule === 'university' 
                    ? (item.type === '本科' ? 'benke' : 'zhuanke')
                    : (item.type === '省级' ? 'shengji' : 'dishiji');
                const tagClass = currentModule === 'university'
                    ? (item.type === '本科' ? 'benke' : 'zhuanke')
                    : (item.type === '省级' ? 'shengji' : 'dishiji');
                const key = currentModule + '_' + item.id;
                const visits = visitStats[key] || 0;
                const isFavorited = favorites.has(key);
                const domain = item.url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
                const faviconUrl = 'https://favicon.hlycc.com/' + domain + '.png';
                const category = getCategory(item.name);
                const schoolType = getSchoolType(item.name);
                const typeClass = schoolType === '民办' ? 'private' : (schoolType === '中外合作' ? 'coop' : 'public');
                
                return `
                    <div class="card ${cardClass} ${currentModule === 'gov' ? 'gov' : ''}" style="animation-delay: ${index * 0.03}s">
                        <div class="card-header">
                            <img class="card-favicon" src="${faviconUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
                            <div class="card-logo" style="display:none">${logoChar}</div>
                            <div class="card-info">
                                <div class="card-title">${item.name}</div>
                                <span class="card-tag ${tagClass}">${item.type}</span>
                                ${currentModule === 'university' ? `<span class="card-school-type ${typeClass}">${schoolType}</span>` : ''}
                            </div>
                        </div>
                        <div class="card-url">${item.url}</div>
                        <div class="card-footer">
                            <span class="card-meta">📍 ${item.location} · 👁 ${visits}次</span>
                            <div class="card-actions">
                                <button class="card-fav ${isFavorited ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${item.id})" title="收藏">${isFavorited ? '⭐' : '☆'}</button>
                                <a href="${item.url}" target="_blank" class="card-action" onclick="visitUrl(${item.id}, '${item.url}', event)">访问</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateUI() {
            const data = currentModule === 'university' ? universityData : govData;
            document.getElementById('pageTitle').textContent = currentModule === 'university' ? '河南高校官网导航' : '河南省政府采购网导航';
            document.getElementById('pageSubtitle').textContent = currentModule === 'university' ? '180 所高等院校' : '19 个政府采购网站';
            document.getElementById('sidebarTitle').textContent = '按城市筛选';
            document.getElementById('searchInput').placeholder = '搜索网站...';
            
            // 显示/隐藏政府采购搜索框
            document.getElementById('govSearchBox').style.display = currentModule === 'gov' ? 'flex' : 'none';
            document.getElementById('monitorSearchBox').style.display = currentModule === 'university' ? 'flex' : 'none';
            
            renderSidebar();
            renderFilters();
            renderCards();
        }

        function initEvents() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentModule = tab.dataset.module;
                    cityFilter = 'all';
                    typeFilter = 'all';
                    categoryFilter = 'all';
                    document.getElementById('searchInput').value = '';
                    searchFilter = '';
                    updateUI();
                });
            });

            document.getElementById('sidebarList').addEventListener('click', (e) => {
                const item = e.target.closest('.sidebar-item');
                if (item) {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    cityFilter = item.dataset.city;
                    renderCards();
                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('active');
                    }
                }
            });

            document.getElementById('filters').addEventListener('click', (e) => {
                const btn = e.target.closest('.filter-btn');
                if (btn) {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.category) {
                        categoryFilter = btn.dataset.category;
                    } else if (btn.dataset.type) {
                        typeFilter = btn.dataset.type;
                    } else if (btn.dataset.schoolType) {
                        schoolTypeFilter = btn.dataset.schoolType;
                    }
                    renderCards();
                }
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchFilter = e.target.value;
                renderCards();
            });

            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('active');
                document.getElementById('menuToggle').classList.toggle('active');
            });
        }

        init();
    </script>
</body>
</html>
